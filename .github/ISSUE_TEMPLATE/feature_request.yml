name: 功能请求
description: 建议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你遇到了什么问题？这个功能要解决什么痛点？
      placeholder: 我在使用时遇到了...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何解决这个问题？
      placeholder: 我希望能够...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 相关组件
      description: 这个功能涉及哪个组件？
      options:
        - Server (服务端)
        - Agent (客户端)
        - Web UI (网页界面)
        - API
        - 安装/部署
        - 文档
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      description: 你认为这个功能的优先级如何？
      options:
        - P0 - 关键功能，阻塞使用
        - P1 - 重要功能，显著提升体验
        - P2 - 有用的改进
        - P3 - 锦上添花
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
      placeholder: 我也考虑过...

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 请描述具体的使用场景
      placeholder: |
        例如：
        - 作为运维人员，我需要...
        - 在监控 100+ 节点时，我希望...
    validations:
      required: true

  - type: checkboxes
    id: willingness
    attributes:
      label: 贡献意愿
      description: 你是否愿意参与实现这个功能？
      options:
        - label: 我愿意提交 PR 实现这个功能
        - label: 我可以帮助测试这个功能
        - label: 我可以帮助完善文档

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何有助于理解这个功能的信息

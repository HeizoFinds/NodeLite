name: Bug 报告
description: 报告一个 bug 帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这个 bug 报告！

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 bug
      placeholder: 告诉我们发生了什么
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 启动服务端 '...'
        2. 执行命令 '...'
        3. 观察到错误 '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 应该显示...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 实际显示...
    validations:
      required: true

  - type: dropdown
    id: reproducible
    attributes:
      label: 是否可稳定复现
      description: 这个问题是否每次都能复现？
      options:
        - 是，每次都能复现
        - 偶尔出现
        - 只出现过一次
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 影响组件
      description: 哪个组件受到影响？
      options:
        - Server (服务端)
        - Agent (客户端)
        - Web UI (网页界面)
        - 安装脚本
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 请提供环境信息
      value: |
        - OS: [例如 Ubuntu 22.04, CentOS 7, macOS 14]
        - NodeLite 版本: [例如 v0.1.0]
        - Rust 版本: [运行 `rustc --version`]
        - 部署方式: [systemd / Docker / 手动运行]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请粘贴相关的日志输出
      placeholder: |
        请粘贴日志，使用 ``` 包裹
      render: shell

  - type: textarea
    id: config
    attributes:
      label: 配置文件（可选）
      description: 如果相关，请提供配置文件内容（请移除敏感信息）
      placeholder: |
        请粘贴配置，使用 ``` 包裹
      render: toml

  - type: checkboxes
    id: attempted
    attributes:
      label: 已尝试的解决方法
      description: 你尝试过哪些方法？
      options:
        - label: 重启服务
        - label: 检查配置文件
        - label: 查看日志
        - label: 搜索现有 issues
        - label: 阅读文档

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何有助于解决问题的信息
